<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#C8943E" />
  <title>Platba dokončena – Farní Dar</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap');
    body {
      min-height: 100vh;
      background: #E8F2EB;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      animation: fadeUp .5s ease both;
    }
    .icon { font-size: 64px; animation: float 3s ease-in-out infinite; margin-bottom: 16px; }
    h1 { font-family: 'Crimson Pro', serif; font-size: 28px; color: #2D2418; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #7A6E5E; margin-bottom: 32px; line-height: 1.5; }
    .ref-box {
      background: #F5EBD7;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .ref-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #7A6E5E; margin-bottom: 4px; }
    .ref-value { font-size: 18px; font-weight: 700; color: #96701F; font-family: monospace; }
    .amount { font-size: 32px; font-weight: 700; color: #4A7C59; margin-bottom: 4px; }
    .verse {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 14px;
      color: #7A6E5E;
      line-height: 1.6;
      margin-bottom: 32px;
      padding: 0 8px;
    }
    .verse span { font-style: normal; font-size: 12px; font-weight: 600; opacity: 0.7; display: block; margin-top: 6px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #C8943E, #8B5E3C);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .failed { background: #FEF2F2; }
    .failed h1 { color: #991B1B; }
    .failed .icon { filter: grayscale(1); }
    .failed .btn { background: linear-gradient(135deg, #C8943E, #8B5E3C); }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">🕊️</div>
    <div class="amount" id="amount"></div>
    <h1 id="title">Děkujeme!</h1>
    <p class="subtitle" id="subtitle">Váš dar byl úspěšně přijat a bude předán farnosti.</p>
    <div class="ref-box" id="refBox">
      <div class="ref-label">Reference platby</div>
      <div class="ref-value" id="refValue">—</div>
    </div>
    <p class="verse">
      „Každý ať dává podle toho, jak se ve svém srdci předem rozhodl."
      <span>2. Korintským 9:7</span>
    </p>
    <a href="/" class="btn">Zpět na Farní Dar</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    const amount = params.get("amount");
    const error = params.get("error");

    if (ref) document.getElementById("refValue").textContent = ref;

    if (amount && !error) {
      document.getElementById("amount").textContent = `${parseInt(amount).toLocaleString("cs-CZ")} Kč`;
    }

    if (error === "1") {
      document.getElementById("card").classList.add("failed");
      document.getElementById("icon").textContent = "😔";
      document.getElementById("title").textContent = "Platba se nezdařila";
      document.getElementById("subtitle").textContent =
        "Platba nebyla dokončena. Zkuste to prosím znovu nebo nás kontaktujte na info@farnidar.cz";
      document.getElementById("amount").textContent = "";
      document.getElementById("refBox").style.display = "none";
    }
  </script>
</body>
</html>
